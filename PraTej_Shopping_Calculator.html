<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>PRATEJ SHOPPING APPLICATION</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet"
href="ShoppingStyle.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>

<body>

<div class="container py-4">

<div class="card shadow p-4">

<h2 class="text-center text-primary mb-4">
PRATEJ SHOPPING APPLICATION
</h2>

<ul class="nav nav-tabs mb-4">

<li class="nav-item">
<button class="nav-link active"
data-bs-toggle="tab"
data-bs-target="#billing">
Billing
</button>
</li>

<li class="nav-item">
<button class="nav-link"
data-bs-toggle="tab"
data-bs-target="#products">
Product Notes
</button>
</li>

</ul>

<div class="tab-content">

<!-- BILLING TAB -->

<div class="tab-pane fade show active"
id="billing">

<div class="row mb-3">

<div class="col-md-6 mb-2">
<label>Date</label>

<input
type="text"
id="currentDate"
class="form-control"
readonly>

</div>

<div class="col-md-6 mb-2">

<label>Customer Name</label>

<input
type="text"
id="customerName"
class="form-control"
placeholder="Enter customer name">

</div>

</div>


<div class="table-responsive">

<table
class="table table-bordered text-center align-middle"
id="billTable">

<thead>

<tr>

<th width="40%">
Product
</th>

<th width="12%">
Qty
</th>

<th width="18%">
Price
</th>

<th width="20%">
Total
</th>

<th width="10%">
Del
</th>

</tr>

</thead>

<tbody id="tableBody">

<tr>

<td>

<input
type="text"
class="form-control product">

</td>

<td>

<input
type="text"
class="form-control qty"
value="1">

</td>

<td>

<input
type="text"
class="form-control price"
value="0">

</td>

<td>

<input
type="number"
class="form-control rowTotal"
readonly>

</td>

<td>

<button
class="btn btn-danger btn-sm removeRow">

<i class="bi bi-trash"></i>

</button>

</td>

</tr>

</tbody>

</table>

</div>


<button
class="btn btn-success mb-4"
id="addRow">

+ Add Row

</button>

<hr>

<div class="row">

<div class="col-md-4 mb-3">

<label>
Grand Total
</label>

<input
type="text"
id="grandTotal"
class="form-control total-box"
readonly>

</div>

<div class="col-md-4 mb-3">

<label>
CGST %
</label>

<input
type="number"
id="cgst"
class="form-control"
value="9">

</div>

<div class="col-md-4 mb-3">

<label>
SGST %
</label>

<input
type="number"
id="sgst"
class="form-control"
value="9">

</div>

</div>

<div class="row">

<div class="col-md-6">

<label>
Final Amount
</label>

<input
type="text"
id="finalAmount"
class="form-control total-box text-success"
readonly>

</div>

</div>


<div class="mt-4">

<button
class="btn btn-primary"
onclick="exportExcel()">

Export Excel

</button>

<button
class="btn btn-danger"
onclick="downloadPDF()">

Download Invoice PDF

</button>

</div>

</div>


<!-- PRODUCT NOTES TAB -->

<div
class="tab-pane fade"
id="products">

<label>
Enter one product per line
</label>

<textarea
id="productList"
class="form-control"
rows="10"
placeholder="Pen&#10;Notebook&#10;Pencil"></textarea>

<br>

<button
class="btn btn-success"
onclick="saveProducts()">

Save Products

</button>

<button
class="btn btn-primary"
onclick="addProductsToBill()">

Add Products To Bill

</button>

</div>

</div>

</div>

</div>


<script src="billingcalculator.js"></script>
<script src="excelPdf.js"></script>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
